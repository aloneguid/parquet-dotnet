name: Bug Report
description: File a bug report
title: "[BUG]: "
labels: ["bug", "triage"]
assignees:
  - octocat
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!

        **House Rules (Non‑Negotiable Edition):**  
        This project does **not** allow the use of Large Language Models (LLMs) for writing code, filing issues, submitting bug reports, crafting pull requests, or anything else even vaguely resembling contribution.  
        
        If your submission looks like it was generated by an LLM, it will be treated like spam, closed with extreme prejudice, and your account may be blocked.  
        
        Please write like a human. Preferably a helpful one.
  - type: input
    id: libversion
    attributes:
      label: Library Version
      description: Tell us the exact Parquet.Net version. "Latest" is not a version, it's a lifestyle.
      placeholder: ex. 6.0.0
    validations:
      required: true
  - type: input
    id: runtime
    attributes:
      label: .NET Runtime
      description: Which .NET runtime are you using? Precision is your friend.
      placeholder: ex. .NET 10
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: OS and Architecture
      description: Select the OS and architecture where the bug decided to ruin your day.
      options:
        - Windows (64-bit)
        - Windows (32-bit)
        - Windows (ARM 64)
        - macOS (Intel 64-bit)
        - macOS (Apple Silicon)
        - Linux (64-bit)
        - Linux (32-bit)
        - Linux (ARM 64)
        - Other (please specify)
    validations:
      required: true
  - type: textarea
    id: repro-steps
    attributes:
      label: How to reproduce?
      description: Provide the exact steps to reproduce the issue. If the steps aren't clear, the issue will be closed faster than you can say "works on my machine."
      value: "..."
    validations:
      required: true
  - type: textarea
    id: repro-code
    attributes:
      label: Failing test
      description: A failing unit test or runnable snippet dramatically speeds up resolution. Without it, debugging becomes interpretive dance - and nobody wants that.
      render: csharp
